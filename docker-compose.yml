version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tastybites-db
    environment:
      POSTGRES_USER: tastybites
      POSTGRES_PASSWORD: tastybites123
      POSTGRES_DB: tastybites
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tastybites"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: ../../docker/backend.Dockerfile
    container_name: tastybites-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://tastybites:tastybites123@postgres:5432/tastybites
      JWT_SECRET: local-dev-secret-change-in-production
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-your_cloud_name}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-your_api_key}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-your_api_secret}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/src:ro
      - ./apps/backend/prisma:/app/prisma:ro
    command: sh -c "npx prisma migrate deploy && npx ts-node-dev --respawn --transpile-only src/index.ts"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: ../../docker/frontend.Dockerfile
    container_name: tastybites-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ""
    depends_on:
      - backend
    volumes:
      - ./apps/frontend/src:/app/src:ro

volumes:
  postgres_data:
