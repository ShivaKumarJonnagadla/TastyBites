<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#E8521A" />
    <meta name="description" content="Tasty Bites - Authentic Indian Food in Sweden. Order finger-licking homemade Indian food online. Fresh, authentic, and made with love." />
    <meta name="keywords" content="Indian food, Swedish delivery, authentic Indian cuisine, biryani, curry, Malmö, halal food" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tasty Bites - Authentic Indian Food" />
    <meta property="og:description" content="Finger licking homemade Indian food freshly prepared with authentic spices." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://tastybites.vercel.app" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tasty Bites - Authentic Indian Food" />
    <meta name="twitter:description" content="Finger licking homemade Indian food in Sweden" />
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "Tasty Bites",
      "description": "Authentic homemade Indian food in Sweden",
      "servesCuisine": "Indian",
      "url": "https://tastybites.vercel.app",
      "priceRange": "$$",
      "address": { "@type": "PostalAddress", "addressLocality": "Malmö", "addressCountry": "SE" }
    }
    </script>
    <title>Tasty Bites - Authentic Indian Food</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
